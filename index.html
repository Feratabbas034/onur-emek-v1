<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Onur Emek Cami Panel</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div id="toast"></div>

<!-- AUTH -->

<div id="auth">

<div class="auth-card">

<h1>Onur Emek Cami</h1>

<input id="login-user" placeholder="Kullanıcı">
<input id="login-pass" type="password" placeholder="Şifre">

<button onclick="App.login()">Giriş</button>

<hr>

<h3>Kayıt</h3>

<input id="reg-name" placeholder="Ad Soyad">
<input id="reg-user" placeholder="Kullanıcı">
<input id="reg-pass" type="password" placeholder="Şifre">

<button onclick="App.register()">Kayıt Ol</button>

</div>

</div>

<!-- APP -->

<div id="app" class="hidden">

<nav>

<h2>Cami Panel</h2>

<ul>

<li onclick="UI.tab('home')">Özet</li>

<li onclick="UI.tab('students')">Öğrenciler</li>

<li onclick="UI.tab('juz')">Cüz</li>

<li onclick="UI.tab('attendance')">Yoklama</li>

<li onclick="UI.tab('ann')">Duyuru</li>

</ul>

<button onclick="App.logout()">Çıkış</button>

</nav>

<main>

<section id="tab-home">

<h2>Genel İstatistik</h2>

<div class="stats">

<div class="card">
<h3>Öğrenci</h3>
<span id="stat-student"></span>
</div>

<div class="card">
<h3>Biten Cüz</h3>
<span id="stat-juz"></span>
</div>

</div>

<canvas id="chart"></canvas>

</section>

<section id="tab-students" class="hidden">

<div class="toolbar">

<input id="search" placeholder="öğrenci ara"
oninput="UI.searchStudent()">

<button onclick="UI.openStudent()">+ öğrenci</button>

</div>

<div id="students"></div>

</section>

<section id="tab-juz" class="hidden">

<select id="juz-student"></select>

<input id="juz-num" type="number" min="1" max="30">

<button onclick="App.assignJuz()">Ata</button>

<div id="juz-list"></div>

</section>

<section id="tab-attendance" class="hidden">

<button onclick="App.takeAttendance()">Yoklama Al</button>

<div id="attendance"></div>

</section>

<section id="tab-ann" class="hidden">

<input id="ann-title" placeholder="Başlık">
<textarea id="ann-text"></textarea>

<button onclick="App.addAnn()">Paylaş</button>

<div id="ann-list"></div>

</section>

</main>

</div>

<script src="script.js"></script>

</body>
</html>
